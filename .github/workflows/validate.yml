name: Validate skill package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile helper scripts
        run: python -m compileall -q scripts

      - name: Validate CCDawn skills
        run: python scripts/validate_ccdawn_skills.py --warnings-as-errors

      - name: Verify installation plan
        run: python scripts/install_codex_library.py --dry-run
